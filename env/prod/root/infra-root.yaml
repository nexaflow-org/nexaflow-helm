apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: finagent-infra-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/nexaflow-org/nexaflow-helm.git
    targetRevision: main
    path: env/prod/infra
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
