apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: finagent-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://github.com/FinAgent-ORG/finagent-helm.git
    targetRevision: main
    path: env/test/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
