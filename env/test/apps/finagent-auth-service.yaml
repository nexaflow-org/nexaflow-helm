apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: finagent-auth-service-test
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/nexaflow-org/nexaflow-helm.git
    targetRevision: main
    path: apps/test/finagent-auth-service
    helm:
      valueFiles:
        - values.yaml
        - values-test.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: finagent-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
