apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: finagent-monitoring-prometheus-test
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-7"
spec:
  project: default
  source:
    repoURL: https://github.com/FinAgent-ORG/finagent-helm.git
    targetRevision: main
    path: infra/monitoring/prometheus
    helm:
      releaseName: prometheus-stack
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
