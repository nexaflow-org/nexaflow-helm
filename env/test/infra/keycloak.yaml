apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: finagent-keycloak-test
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
spec:
  project: default
  source:
    repoURL: https://github.com/FinAgent-ORG/finagent-helm.git
    targetRevision: main
    path: infra/keycloak
    helm:
      releaseName: keycloak
      valueFiles:
        - values.yaml
        - values-test.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
