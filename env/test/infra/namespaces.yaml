apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: finagent-namespaces-test
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  project: default
  source:
    repoURL: https://git.example.com/your-org/finagent-gitops.git
    targetRevision: HEAD
    path: finagent/infra/namespaces
    helm:
      valueFiles:
        - values.yaml
        - values-test.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
