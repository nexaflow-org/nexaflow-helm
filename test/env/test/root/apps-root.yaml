apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: finagent-test-apps-root
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://git.example.com/your-org/finagent-gitops.git
    targetRevision: HEAD
    path: finagent/env/test/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
