name: finagent-chat-service
namespace: finagent-apps
replicaCount: 1
image:
  repository: your-registry/finagent-chat-service
  tag: latest
  pullPolicy: IfNotPresent
serviceAccount:
  create: true
service:
  name: chat-service
  type: ClusterIP
  port: 8004
route:
  enabled: true
  gatewayName: finagent-gateway
  gatewayNamespace: finagent-gateway-ns
  hostnames:
    - api.finagent.example.com
  pathPrefix: /api/v1/chat
config:
  APP_NAME: finagent-chat-service
  APP_ENV: test
  APP_HOST: 0.0.0.0
  APP_PORT: "8004"
  EXPENSE_SERVICE_BASE_URL: http://expense-service.finagent-apps.svc.cluster.local:8002
  OLLAMA_BASE_URL: http://ollama.finagent-dbs.svc.cluster.local:11434
  OLLAMA_MODEL: llama3.1
  OLLAMA_TEMPERATURE: "0"
  JWT_ALGORITHM: HS256
  ALLOWED_ORIGINS: https://finagent.example.com
  RATE_LIMIT_REQUESTS: "120"
  RATE_LIMIT_WINDOW_SECONDS: "60"
secret:
  JWT_SECRET_KEY: change-me-shared-jwt-secret
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
