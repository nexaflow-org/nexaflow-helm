apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.name }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "finagent-frontend.labels" . | nindent 4 }}
data:
  APP_MODE: {{ .Values.config.APP_MODE | quote }}
  API_BASE_HINT: {{ .Values.config.API_BASE_HINT | quote }}
  default.conf: |
    server {
      listen 8080;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
      }

      location /api/v1/auth/ {
        proxy_pass http://{{ .Values.nginx.authServiceHost }}:{{ .Values.nginx.authServicePort }}/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /api/v1/expenses/ {
        proxy_pass http://{{ .Values.nginx.expenseServiceHost }}:{{ .Values.nginx.expenseServicePort }}/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /api/v1/insights/ {
        proxy_pass http://{{ .Values.nginx.insightsServiceHost }}:{{ .Values.nginx.insightsServicePort }}/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /api/v1/chat/ {
        proxy_pass http://{{ .Values.nginx.chatServiceHost }}:{{ .Values.nginx.chatServicePort }}/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
