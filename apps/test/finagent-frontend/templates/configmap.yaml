apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.name }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "finagent-frontend.labels" . | nindent 4 }}
data:
  APP_MODE: {{ .Values.config.APP_MODE | quote }}
  PORT: {{ .Values.config.PORT | quote }}
  SESSION_COOKIE_SECURE: {{ .Values.config.SESSION_COOKIE_SECURE | quote }}
  AUTH_SERVICE_URL: {{ .Values.config.AUTH_SERVICE_URL | quote }}
  EXPENSE_SERVICE_URL: {{ .Values.config.EXPENSE_SERVICE_URL | quote }}
  INSIGHTS_SERVICE_URL: {{ .Values.config.INSIGHTS_SERVICE_URL | quote }}
  CHAT_SERVICE_URL: {{ .Values.config.CHAT_SERVICE_URL | quote }}
