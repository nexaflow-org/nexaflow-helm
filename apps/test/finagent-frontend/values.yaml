name: finagent-frontend
namespace: finagent-apps
replicaCount: 1
image:
  repository: ghcr.io/finagent-org/finagent-frontend
  tag: latest
  pullPolicy: IfNotPresent
serviceAccount:
  create: true
service:
  name: frontend-service
  type: ClusterIP
  port: 8080
route:
  enabled: true
  gatewayName: finagent-gateway
  gatewayNamespace: finagent-gateway-ns
  hostnames:
    - finagent.example.com
  pathPrefix: /
config:
  APP_MODE: test
  API_BASE_HINT: /api
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi
