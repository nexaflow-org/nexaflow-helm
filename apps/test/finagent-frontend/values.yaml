name: finagent-frontend
namespace: finagent-apps
replicaCount: 1
image:
  repository: ghcr.io/finagent-org/finagent-frontend
  tag: latest
  pullPolicy: IfNotPresent
serviceAccount:
  create: true
service:
  type: ClusterIP
  port: 8080
route:
  enabled: true
  gatewayName: finagent-gateway
  gatewayNamespace: finagent-gateway-ns
  hostnames:
    - finagent-test.example.com
  pathPrefix: /
config:
  APP_MODE: test
  API_BASE_HINT: /api
nginx:
  authServiceHost: finagent-auth-service-service.finagent-apps.svc.cluster.local
  authServicePort: 8001
  expenseServiceHost: finagent-expense-service-service.finagent-apps.svc.cluster.local
  expenseServicePort: 8002
  insightsServiceHost: finagent-insights-service-service.finagent-apps.svc.cluster.local
  insightsServicePort: 8003
  chatServiceHost: finagent-chat-service-service.finagent-apps.svc.cluster.local
  chatServicePort: 8004
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi
