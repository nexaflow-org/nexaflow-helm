name: finagent-frontend
namespace: finagent-apps
replicaCount: 1
image:
  repository: ghcr.io/finagent-org/finagent-frontend
  tag: latest
  pullPolicy: IfNotPresent
serviceAccount:
  create: true
service:
  name: frontend-service
  type: ClusterIP
  port: 8080
route:
  enabled: true
  gatewayName: finagent-gateway
  gatewayNamespace: finagent-gateway-ns
  hostnames:
    - finagent.example.com
  pathPrefix: /
config:
  APP_MODE: test
  PORT: "8080"
  SESSION_COOKIE_SECURE: "false"
  AUTH_SERVICE_URL: http://auth-service.finagent-apps.svc.cluster.local:8001
  EXPENSE_SERVICE_URL: http://expense-service.finagent-apps.svc.cluster.local:8002
  INSIGHTS_SERVICE_URL: http://insights-service.finagent-apps.svc.cluster.local:8003
  CHAT_SERVICE_URL: http://chat-service.finagent-apps.svc.cluster.local:8004
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi
