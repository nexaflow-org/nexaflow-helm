namespace: finagent-apps
replicaCount: 2
image:
  repository: ghcr.io/finagent-org/finagent-frontend
  tag: prod
config:
  APP_MODE: production
  SESSION_COOKIE_SECURE: "true"
route:
  hostnames:
    - finagent.example.com
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
