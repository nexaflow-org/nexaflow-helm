name: finagent-expense-service
namespace: finagent-apps
replicaCount: 1
image:
  repository: ghcr.io/finagent-org/finagent-expense
  tag: 044157e
  pullPolicy: IfNotPresent
serviceAccount:
  create: true
service:
  name: expense-service
  type: ClusterIP
  port: 8002
route:
  enabled: false
  gatewayName: finagent-gateway
  gatewayNamespace: finagent-gateway-ns
  hostnames:
    - api.finagent.example.com
  pathPrefix: /api/v1/expenses
config:
  APP_NAME: finagent-expense-service
  APP_ENV: test
  APP_HOST: 0.0.0.0
  APP_PORT: "8002"
  MYSQL_HOST: mysql-server.finagent-dbs.svc.cluster.local
  MYSQL_PORT: "3306"
  MYSQL_DATABASE: finagent_expense
  MYSQL_ADMIN_HOST: mysql-server.finagent-dbs.svc.cluster.local
  MYSQL_ADMIN_PORT: "3306"
  MYSQL_ADMIN_DATABASE: mysql
  OLLAMA_BASE_URL: http://ollama.finagent-dbs.svc.cluster.local:11434
  OLLAMA_MODEL: llama3.2:3b
  OLLAMA_VISION_MODEL: ""
  OLLAMA_IMAGE_EXTRACTION_ENABLED: "false"
  JWT_ALGORITHM: HS256
  ALLOWED_ORIGINS: https://finagent.example.com
  RATE_LIMIT_REQUESTS: "120"
  RATE_LIMIT_WINDOW_SECONDS: "60"
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
initDbJob:
  enabled: true
