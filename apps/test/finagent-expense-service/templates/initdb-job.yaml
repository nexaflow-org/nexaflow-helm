{{- if .Values.initDbJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.name }}-init-db
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "finagent-expense-service.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded,HookFailed
spec:
  backoffLimit: 4
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "finagent-expense-service.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ .Values.name }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: init-db
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "/scripts/init_db.py"]
          env:
            - name: USER
              value: appuser
            - name: LOGNAME
              value: appuser
          envFrom:
            - configMapRef:
                name: {{ .Values.name }}-config
            - secretRef:
                name: {{ .Values.name }}-secret
          volumeMounts:
            - name: init-db-script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: init-db-script
          configMap:
            name: {{ .Values.name }}-init-db-script
            defaultMode: 0555
{{- end }}
