apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.name }}-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "finagent-expense-service.labels" . | nindent 4 }}
  {{- if .Values.initDbJob.enabled }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
  {{- end }}
type: Opaque
stringData:
  MYSQL_USER: {{ .Values.secret.MYSQL_USER | quote }}
  MYSQL_PASSWORD: {{ .Values.secret.MYSQL_PASSWORD | quote }}
  MYSQL_ADMIN_USER: {{ .Values.secret.MYSQL_ADMIN_USER | quote }}
  MYSQL_ADMIN_PASSWORD: {{ .Values.secret.MYSQL_ADMIN_PASSWORD | quote }}
  JWT_SECRET_KEY: {{ .Values.secret.JWT_SECRET_KEY | quote }}
