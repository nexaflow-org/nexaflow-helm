apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}-deployment
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "finagent-expense-service.labels" . | nindent 4 }}
  {{- if .Values.initDbJob.enabled }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "finagent-expense-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "finagent-expense-service.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.name }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: expense-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8002
              name: http
          env:
            - name: USER
              value: appuser
            - name: LOGNAME
              value: appuser
          envFrom:
            - configMapRef:
                name: {{ .Values.name }}-config
            - secretRef:
                name: {{ .Values.name }}-secret
          readinessProbe:
            httpGet:
              path: /api/v1/expenses/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/expenses/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /api/v1/expenses/health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
