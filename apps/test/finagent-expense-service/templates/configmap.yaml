apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.name }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "finagent-expense-service.labels" . | nindent 4 }}
  {{- if .Values.initDbJob.enabled }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  {{- end }}
data:
  APP_NAME: {{ .Values.config.APP_NAME | quote }}
  APP_ENV: {{ .Values.config.APP_ENV | quote }}
  APP_HOST: {{ .Values.config.APP_HOST | quote }}
  APP_PORT: {{ .Values.config.APP_PORT | quote }}
  MYSQL_HOST: {{ .Values.config.MYSQL_HOST | quote }}
  MYSQL_PORT: {{ .Values.config.MYSQL_PORT | quote }}
  MYSQL_DATABASE: {{ .Values.config.MYSQL_DATABASE | quote }}
  MYSQL_ADMIN_HOST: {{ .Values.config.MYSQL_ADMIN_HOST | quote }}
  MYSQL_ADMIN_PORT: {{ .Values.config.MYSQL_ADMIN_PORT | quote }}
  MYSQL_ADMIN_DATABASE: {{ .Values.config.MYSQL_ADMIN_DATABASE | quote }}
  OLLAMA_BASE_URL: {{ .Values.config.OLLAMA_BASE_URL | quote }}
  OLLAMA_MODEL: {{ .Values.config.OLLAMA_MODEL | quote }}
  OLLAMA_VISION_MODEL: {{ .Values.config.OLLAMA_VISION_MODEL | quote }}
  JWT_ALGORITHM: {{ .Values.config.JWT_ALGORITHM | quote }}
  ALLOWED_ORIGINS: {{ .Values.config.ALLOWED_ORIGINS | quote }}
  RATE_LIMIT_REQUESTS: {{ .Values.config.RATE_LIMIT_REQUESTS | quote }}
  RATE_LIMIT_WINDOW_SECONDS: {{ .Values.config.RATE_LIMIT_WINDOW_SECONDS | quote }}
