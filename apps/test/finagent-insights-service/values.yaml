name: finagent-insights-service
namespace: finagent-apps
replicaCount: 1
image:
  repository: ghcr.io/finagent-org/finagent-insights
  tag: latest
  pullPolicy: IfNotPresent
serviceAccount:
  create: true
service:
  name: insights-service
  type: ClusterIP
  port: 8003
route:
  enabled: false
  gatewayName: finagent-gateway
  gatewayNamespace: finagent-gateway-ns
  hostnames:
    - api.finagent.example.com
  pathPrefix: /api/v1/insights
config:
  APP_NAME: finagent-insights-service
  APP_ENV: test
  APP_HOST: 0.0.0.0
  APP_PORT: "8003"
  EXPENSE_SERVICE_BASE_URL: http://expense-service.finagent-apps.svc.cluster.local:8002
  OLLAMA_BASE_URL: http://ollama.finagent-dbs.svc.cluster.local:11434
  OLLAMA_MODEL: llama3.2:3b
  OLLAMA_TEMPERATURE: "0"
  JWT_ALGORITHM: HS256
  ALLOWED_ORIGINS: https://finagent.example.com
  RATE_LIMIT_REQUESTS: "120"
  RATE_LIMIT_WINDOW_SECONDS: "60"
secret:
  JWT_SECRET_KEY: change-me-shared-jwt-secret
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
