namespace: finagent-apps-prod
replicaCount: 2
nodeSelector:
  finagent.io/demo-pending: "true"
image:
  repository: ghcr.io/nexaflow-org/nexaflow-insights
  tag: 648f4cf
config:
  APP_ENV: production
  EXPENSE_SERVICE_BASE_URL: http://expense-service.finagent-apps-prod.svc.cluster.local:8002
  OLLAMA_BASE_URL: http://ollama.finagent-dbs.svc.cluster.local:11434
  ALLOWED_ORIGINS: https://finagent.example.com
route:
  hostnames:
    - api.finagent.example.com
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi
