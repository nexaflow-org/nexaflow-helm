namespace: finagent-apps-prod
replicaCount: 3
nodeSelector:
  finagent.io/demo-pending: "true"
image:
  repository: ghcr.io/finagent-org/finagent-auth
  tag: "d5b8121"
config:
  APP_ENV: production
  MYSQL_HOST: mysql-server.finagent-dbs.svc.cluster.local
  MYSQL_ADMIN_HOST: mysql-server.finagent-dbs.svc.cluster.local
  ALLOWED_ORIGINS: https://finagent.example.com
route:
  hostnames:
    - api.finagent.example.com
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi
