---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: finagent-auth-service-secret
  namespace: finagent-apps
spec:
  encryptedData:
    JWT_SECRET_KEY: 
    MYSQL_ADMIN_PASSWORD: 
    MYSQL_ADMIN_USER: 
    MYSQL_PASSWORD: 
    MYSQL_USER: 
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
      labels:
        app.kubernetes.io/component: auth
        app.kubernetes.io/instance: finagent-auth-service
        app.kubernetes.io/name: finagent-auth-service
        app.kubernetes.io/part-of: finagent
      name: finagent-auth-service-secret
      namespace: finagent-apps
    type: Opaque
