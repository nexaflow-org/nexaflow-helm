name: finagent-auth-service
namespace: finagent-apps
replicaCount: 1
image:
  repository: your-registry/finagent-auth-service
  tag: latest
  pullPolicy: IfNotPresent
serviceAccount:
  create: true
service:
  name: auth-service
  type: ClusterIP
  port: 8001
route:
  enabled: true
  gatewayName: finagent-gateway
  gatewayNamespace: finagent-gateway-ns
  hostnames:
    - api.finagent.example.com
  pathPrefix: /api/v1/auth
config:
  APP_NAME: finagent-auth-service
  APP_ENV: test
  APP_HOST: 0.0.0.0
  APP_PORT: "8001"
  LOG_LEVEL: INFO
  MYSQL_HOST: mysql-server.finagent-dbs.svc.cluster.local
  MYSQL_PORT: "3306"
  MYSQL_DATABASE: finagent_auth
  MYSQL_ADMIN_HOST: mysql-server.finagent-dbs.svc.cluster.local
  MYSQL_ADMIN_PORT: "3306"
  MYSQL_ADMIN_DATABASE: mysql
  JWT_ALGORITHM: HS256
  JWT_EXP_MINUTES: "60"
  ALLOWED_ORIGINS: https://finagent.example.com
  RATE_LIMIT_REQUESTS: "120"
  RATE_LIMIT_WINDOW_SECONDS: "60"
secret:
  MYSQL_USER: finagent_auth_user
  MYSQL_PASSWORD: change-me-auth-db-password
  MYSQL_ADMIN_USER: root
  MYSQL_ADMIN_PASSWORD: change-me-shared-root-password
  JWT_SECRET_KEY: change-me-auth-jwt-secret
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
initDbJob:
  enabled: true
