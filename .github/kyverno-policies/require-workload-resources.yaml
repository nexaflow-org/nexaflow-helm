apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-workload-resources
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: require-container-resources
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
      validate:
        message: All workload containers must define CPU and memory requests and limits.
        foreach:
          - list: request.object.spec.template.spec.containers
            pattern:
              resources:
                requests:
                  cpu: "?*"
                  memory: "?*"
                limits:
                  cpu: "?*"
                  memory: "?*"
