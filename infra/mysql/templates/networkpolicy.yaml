apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.name }}-allow-apps
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "finagent-mysql.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "finagent-mysql.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.appsNamespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: finagent-auth-service
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.appsNamespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: finagent-expense-service
      ports:
        - protocol: TCP
          port: 3306
