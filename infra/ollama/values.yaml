name: ollama
namespace: finagent-dbs
image:
  repository: ollama/ollama
  tag: "0.6.5"
  pullPolicy: IfNotPresent
service:
  port: 11434
storage:
  accessMode: ReadWriteOnce
  className: finagent-nfs
  size: 30Gi
model:
  pullEnabled: true
  name: tinyllama
  names:
    - tinyllama
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi
