apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headlamp-route
  namespace: headlamp
  labels:
    app.kubernetes.io/part-of: finagent
    app.kubernetes.io/component: headlamp
    shared-gateway: "true"
spec:
  parentRefs:
  - name: finagent-gateway
    namespace: finagent-gateway-ns
  hostnames:
  - k8s.myfinagent.online
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: headlamp
      port: 80
