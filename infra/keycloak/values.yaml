keycloak:
  production: false
  proxyHeaders: xforwarded
  httpEnabled: true
  cache:
    enabled: false

  image:
    registry: docker.io
    repository: bitnamilegacy/keycloak
    tag: 26.3.3-debian-12-r0

  auth:
    adminUser: admin
    adminPassword: "ChangeMe-Admin-Password-Immediately"

  service:
    type: ClusterIP
    http:
      enabled: true

  ingress:
    enabled: false

  tls:
    enabled: false

  replicaCount: 1

  resourcesPreset: small

  extraEnvVars:
    - name: KC_DB
      value: dev-file
    - name: KC_HOSTNAME
      value: https://keyclaok.myfinagent.online
    - name: KC_HOSTNAME_STRICT
      value: "true"
    - name: KC_HTTP_ENABLED
      value: "true"
    - name: KC_PROXY_HEADERS
      value: xforwarded

  postgresql:
    enabled: false

httpRoute:
  enabled: true
  name: keycloak-route
  namespace: keycloak
  hostname: keyclaok.myfinagent.online
  gateway:
    name: finagent-gateway
    namespace: finagent-gateway-ns
  path:
    type: PathPrefix
    value: /
  backend:
    name: keycloak
    port: 80
